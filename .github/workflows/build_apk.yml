name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: "17"

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.22.0"
          channel: stable
          cache: true

      - name: Write local.properties
        run: |
          echo "flutter.sdk=$FLUTTER_ROOT" > flasher_app/android/local.properties
          echo "sdk.dir=$ANDROID_SDK_ROOT" >> flasher_app/android/local.properties

      - name: Flutter pub get
        working-directory: flasher_app
        run: flutter pub get

      - name: Flutter build APK
        working-directory: flasher_app
        run: flutter build apk --release

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: IR-Remote-Flasher
          path: flasher_app/build/app/outputs/flutter-apk/app-release.apk

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: apk-v${{ github.run_number }}
          name: IR Remote Flasher APK v${{ github.run_number }}
          body: |
            Android APK — ESP32 IR Remote Flasher

            Install: Download → Install (allow unknown sources) → USB OTG connect → Flash

            Supported chips: CP2102, CH340, FTDI, ESP32-S3
          files: flasher_app/build/app/outputs/flutter-apk/app-release.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
