name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'
          cache: true

      - name: Write local.properties
        run: |
          echo "flutter.sdk=$FLUTTER_ROOT" > flasher_app/android/local.properties
          echo "sdk.dir=$ANDROID_SDK_ROOT" >> flasher_app/android/local.properties

      - name: Get dependencies
        run: cd flasher_app && flutter pub get

      - name: Build APK
        run: cd flasher_app && flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: IR-Remote-Flasher-APK
          path: flasher_app/build/app/outputs/flutter-apk/app-release.apk

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: apk-v${{ github.run_number }}
          name: "IR Remote Flasher APK v${{ github.run_number }}"
          body: |
            ## IR Remote Flasher — Android APK

            ### Install karo:
            1. APK download karo
            2. Phone mein install karo (Unknown sources allow karo)
            3. ESP32 ko USB OTG se connect karo
            4. App open karo → Scan → Connect → Flash

            ### Supported: CP2102, CH340, FTDI, ESP32-S3 Native USB
            ### Android 5.0+ required
          files: flasher_app/build/app/outputs/flutter-apk/app-release.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
