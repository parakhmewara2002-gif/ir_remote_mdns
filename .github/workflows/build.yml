name: 🔨 Build IR Remote Firmware

# ── Triggers ─────────────────────────────────────────────────
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

# PERMISSIONS: kept at write because the release step at the bottom uses
# softprops/action-gh-release which needs contents:write. PR runs inherit
# this — the release step itself is gated to push-on-main so it can't
# actually publish from a PR, but the broader scope is a known limitation.
# To tighten further: split into a read-only build job + a separate
# release job that's `if: github.event_name == 'push'` and has its own
# permissions block.
permissions:
  contents: write

# CONCURRENCY FIX: prevent rapid pushes from racing each other on the
# release tag namespace and from wasting CI minutes on superseded PR
# commits.
concurrency:
  group: build-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FIRMWARE_VERSION: "10.0.0"
  PIO_ENV: esp32dev
  PIO_VERSION: "6.1.19"
  # Partition layout v7.0.1 (no-OTA, factory-only) — must match
  # partitions_custom.csv exactly. See the validator below.
  APP_PART_KB: "3072"
  FS_PART_KB:  "960"
  FS_ADDR:     "0x310000"

jobs:
  build:
    name: "Compile Firmware + LittleFS"
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:

      - name: "📥 Checkout"
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: "🐍 Set up Python 3.12"
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: "📦 Install PlatformIO"
        run: |
          python -m pip install --upgrade pip
          pip install "platformio==${{ env.PIO_VERSION }}"
          pio --version

      - name: "🗄️ Cache PlatformIO"
        id: cache-pio
        uses: actions/cache@v4
        with:
          path: |
            ~/.platformio
            ~/.cache/pip
          key: ${{ runner.os }}-pio-${{ env.PIO_VERSION }}-${{ hashFiles('platformio.ini') }}-v7
          restore-keys: |
            ${{ runner.os }}-pio-${{ env.PIO_VERSION }}-
            ${{ runner.os }}-pio-

      - name: "ℹ️ Cache status"
        run: |
          if [ "${{ steps.cache-pio.outputs.cache-hit }}" == "true" ]; then
            echo "✅ Cache hit — toolchain restored from cache"
          else
            echo "⚠️  Cache miss — downloading toolchain (~3 min)"
          fi

      - name: "✅ Validate partition table"
        run: |
          python3 - << 'PYEOF'
          # Layout v7.0.1: OTA removed → single factory app slot + max LittleFS.
          # Must match partitions_custom.csv byte-for-byte.
          parts = [
              ('nvs',     0x9000,   0x5000),
              ('app0',    0x10000,  0x300000),   # 3072 KB factory
              ('spiffs',  0x310000, 0xF0000),    #  960 KB LittleFS
          ]
          FLASH = 4 * 1024 * 1024
          # nvs sits at 0x9000; the bootloader+partition-table area below is
          # reserved by the ESP32 SDK (not a partition entry), so we don't
          # require parts[0].offset to be 0 — only enforce no overlap from
          # nvs onward.
          ok = True
          for i, (name, offset, size) in enumerate(parts):
              end = offset + size
              if end > FLASH:
                  print(f"❌ {name} OVERFLOWS flash at 0x{end:06X}")
                  ok = False
              if i > 0:
                  prev_end = parts[i-1][1] + parts[i-1][2]
                  if offset < prev_end:
                      print(f"❌ OVERLAP: {parts[i-1][0]} ends 0x{prev_end:06X} but {name} starts 0x{offset:06X}")
                      ok = False
                  elif offset != prev_end:
                      print(f"⚠️  GAP {(offset-prev_end)//1024} KB between {parts[i-1][0]} and {name} (allowed but wastes flash)")
              print(f"  {name:10} 0x{offset:06X} -> 0x{end:06X}  ({size//1024} KB)")
          if ok:
              print("✅ Partition table validated — no overflow, no overlap")
          else:
              import sys; sys.exit(1)
          PYEOF

      - name: "⚙️ Build firmware"
        run: |
          pio run -e ${{ env.PIO_ENV }} 2>&1 | tee build_firmware.log
          test ${PIPESTATUS[0]} -eq 0
        env:
          PLATFORMIO_CI: "1"
          PLATFORMIO_NO_ANSI: "1"

      - name: "🗂️ Build LittleFS image"
        run: |
          pio run -e ${{ env.PIO_ENV }} --target buildfs 2>&1 | tee build_littlefs.log
          test ${PIPESTATUS[0]} -eq 0
        env:
          PLATFORMIO_CI: "1"
          PLATFORMIO_NO_ANSI: "1"

      - name: "🔍 Verify build outputs"
        run: |
          echo "=== Build outputs ==="
          ls -lh .pio/build/${{ env.PIO_ENV }}/
          for f in firmware.bin bootloader.bin partitions.bin littlefs.bin; do
            if [ ! -f ".pio/build/${{ env.PIO_ENV }}/$f" ]; then
              echo "❌ MISSING: $f"
              exit 1
            else
              echo "✅ Found: $f ($(du -h .pio/build/${{ env.PIO_ENV }}/$f | cut -f1))"
            fi
          done

      - name: "📊 Binary size report"
        run: |
          echo "============================================"
          echo "  Binary Size Report — v${{ env.FIRMWARE_VERSION }}"
          echo "  Partition layout v7.0.1 (4 MB ESP32, factory-only)"
          echo "  app0  : ${{ env.APP_PART_KB }} KB @ 0x010000"
          echo "  spiffs: ${{ env.FS_PART_KB }} KB @ ${{ env.FS_ADDR }}"
          echo "============================================"
          FW=$(stat -c%s .pio/build/${{ env.PIO_ENV }}/firmware.bin)
          FW_MAX=$(( ${{ env.APP_PART_KB }} * 1024 ))
          FW_PCT=$(( FW * 100 / FW_MAX ))
          FW_FREE=$(( (FW_MAX - FW) / 1024 ))
          FS=$(stat -c%s .pio/build/${{ env.PIO_ENV }}/littlefs.bin)
          FS_MAX=$(( ${{ env.FS_PART_KB }} * 1024 ))
          FS_PCT=$(( FS * 100 / FS_MAX ))
          FS_FREE=$(( (FS_MAX - FS) / 1024 ))
          echo "firmware.bin  : $(numfmt --to=iec $FW) / ${{ env.APP_PART_KB }} KB  (${FW_PCT}% used, ${FW_FREE} KB free)"
          echo "littlefs.bin  : $(numfmt --to=iec $FS) / ${{ env.FS_PART_KB }} KB   (${FS_PCT}% used, ${FS_FREE} KB free)"
          echo "============================================"
          if [ $FW -gt $FW_MAX ]; then
            echo "❌ FATAL: firmware.bin exceeds app partition (${{ env.APP_PART_KB }} KB)!"
            exit 1
          fi
          if [ $FW_PCT -gt 90 ]; then
            echo "⚠️  WARNING: firmware partition >90% full"
          else
            echo "✅ Firmware fits in app partition with headroom"
          fi

      - name: "📁 Collect binaries"
        run: |
          mkdir -p release_bins
          cp .pio/build/${{ env.PIO_ENV }}/firmware.bin    release_bins/firmware.bin
          cp .pio/build/${{ env.PIO_ENV }}/bootloader.bin  release_bins/bootloader.bin
          cp .pio/build/${{ env.PIO_ENV }}/partitions.bin  release_bins/partitions.bin
          cp .pio/build/${{ env.PIO_ENV }}/littlefs.bin    release_bins/littlefs.bin
          cat > release_bins/BUILD_INFO.txt << EOF
          IR Remote Web GUI v${{ env.FIRMWARE_VERSION }}
          Build   : #${{ github.run_number }}
          Commit  : ${{ github.sha }}
          Branch  : ${{ github.ref_name }}
          Date    : $(date -u '+%Y-%m-%d %H:%M:%S UTC')
          PIO     : ${{ env.PIO_VERSION }}
          Target  : ESP32-WROOM-32 (4 MB Flash)

          Partition layout v7.0.1 (no OTA, factory-only):
            nvs       0x009000   20 KB
            app0      0x010000 3072 KB  ← factory firmware slot
            spiffs    ${{ env.FS_ADDR }}  ${{ env.FS_PART_KB }} KB  ← LittleFS

          Flash addresses (esptool):
            0x1000              bootloader.bin
            0x8000              partitions.bin
            0x10000             firmware.bin
            ${{ env.FS_ADDR }}            littlefs.bin
          EOF
          ls -lh release_bins/

      - name: "📤 Upload build artifacts"
        uses: actions/upload-artifact@v4
        with:
          name: "IR-Remote-v${{ env.FIRMWARE_VERSION }}-build-${{ github.run_number }}"
          path: release_bins/
          retention-days: 90
          if-no-files-found: error

      - name: "🔍 Commit build errors to repo (debug)"
        if: failure()
        run: |
          git config user.email "ci@github.com"
          git config user.name "GitHub CI"
          tail -150 build_firmware.log > BUILD_ERROR.log 2>/dev/null || echo "no log" > BUILD_ERROR.log
          git add BUILD_ERROR.log
          git commit -m "ci: build error log [skip ci]" || true
          git push origin master || true
        continue-on-error: true
      
      - name: "📋 Upload build logs on failure"
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: "build-logs-run-${{ github.run_number }}"
          path: |
            build_firmware.log
            build_littlefs.log
          retention-days: 14
          if-no-files-found: ignore

      - name: "🚀 Create GitHub Release"
        if: >
          github.event_name == 'push' &&
          (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ env.FIRMWARE_VERSION }}-build.${{ github.run_number }}"
          name: "IR Remote v${{ env.FIRMWARE_VERSION }} — Build #${{ github.run_number }}"
          body: |
            ## 🔧 IR Remote Web GUI v${{ env.FIRMWARE_VERSION }}
            **Target:** ESP32-WROOM-32 (4 MB Flash)
            **Commit:** `${{ github.sha }}`
            **Build:** #${{ github.run_number }}

            ---

            ### ⚡ First Flash (USB — one time only)

            **Linux / macOS:**
            ```bash
            pip install esptool
            esptool.py --chip esp32 --port /dev/ttyUSB0 --baud 921600 \
              write_flash \
              0x1000    bootloader.bin \
              0x8000    partitions.bin \
              0x10000   firmware.bin \
              ${{ env.FS_ADDR }}  littlefs.bin
            ```

            **Windows:**
            ```cmd
            pip install esptool
            esptool.py --chip esp32 --port COM3 --baud 921600 ^
              write_flash ^
              0x1000    bootloader.bin ^
              0x8000    partitions.bin ^
              0x10000   firmware.bin ^
              ${{ env.FS_ADDR }}  littlefs.bin
            ```

            > ⚠️ `littlefs.bin` must flash to **`${{ env.FS_ADDR }}`** (partition layout v7.0.1) — earlier releases used `0x2D0000`, `0x350000`, or `0x390000`.

            ---

            ### 📶 After Flashing
            | | |
            |---|---|
            | **WiFi AP** | `IR-Remote` / `irremote123` |
            | **Browser** | http://192.168.4.1 |

            ### 📦 Partition Layout v7.0.1 (no OTA)
            | Partition | Offset | Size |
            |---|---|---|
            | nvs | 0x009000 | 20 KB |
            | app0 (factory) | 0x010000 | 3072 KB |
            | spiffs (LittleFS) | **${{ env.FS_ADDR }}** | ${{ env.FS_PART_KB }} KB |

          files: |
            release_bins/firmware.bin
            release_bins/bootloader.bin
            release_bins/partitions.bin
            release_bins/littlefs.bin
            release_bins/BUILD_INFO.txt
          draft: false
          prerelease: false
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
