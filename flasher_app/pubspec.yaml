name: ir_remote_flasher
description: ESP32 IR Remote Flasher — Flash firmware via USB OTG on Android
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.10.0'

dependencies:
  flutter:
    sdk: flutter
  usb_serial: ^0.5.1
  http: ^1.2.0
  path_provider: ^2.1.2
  file_picker: ^8.0.3
  permission_handler: ^11.3.0
  crypto: ^3.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
